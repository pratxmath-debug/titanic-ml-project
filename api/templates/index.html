<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Prediction</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 400px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #0056b3;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>Titanic Survival Prediction</h1>

        <form action="/predict" method="post">

            <input type="number" name="Pclass" placeholder="Passenger Class (1-3)" required>

            <input type="number" name="Sex" placeholder="Gender (0 = Male, 1 = Female)" required>

            <input type="number" name="Age" placeholder="Age" required>

            <input type="number" name="Fare" placeholder="Fare" required>

            <button type="submit">Predict</button>

        </form>

        <div class="result">
            {{ prediction_text }}
        </div>
    </div>

</body>
</html>
